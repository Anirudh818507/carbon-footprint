<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self';">
<title>Tread — Test Suite</title>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
    background: #F7F4EA;
    color: #1C2B22;
    max-width: 720px;
    margin: 0 auto;
    padding: 48px 24px;
    line-height: 1.5;
  }
  h1 { font-size: 22px; margin-bottom: 4px; }
  .subtitle { color: #44544A; font-size: 14px; margin-bottom: 28px; }
  .test-summary {
    font-family: monospace;
    font-weight: 700;
    font-size: 15px;
    padding: 12px 16px;
    border-radius: 8px;
    margin-bottom: 16px;
  }
  .test-summary.all-pass { background: rgba(62,107,79,0.12); color: #2C4D38; }
  .test-summary.has-fail { background: rgba(201,123,74,0.12); color: #C97B4A; }
  .test-list {
    list-style: none;
    padding: 0;
    margin: 0;
  }
  .test-list li {
    padding: 10px 14px;
    border-bottom: 1px solid rgba(28,43,34,0.1);
    font-size: 13.5px;
    font-family: monospace;
  }
  .test-list li.pass { color: #2C4D38; }
  .test-list li.fail { color: #C97B4A; font-weight: 700; }
  a { color: #3E6B4F; }
</style>
</head>
<body>
  <h1>Tread — Calculator Test Suite</h1>
  <p class="subtitle">Unit tests for the carbon footprint calculation logic. Open the browser console for the full log. <a href="index.html">← Back to app</a></p>
  <div id="testResults">Running tests&hellip;</div>

  <!-- Load the app's calculator logic, then run tests against it -->
  <script src="script.js"></script>
  <script src="tests.js"></script>
</body>
</html>
